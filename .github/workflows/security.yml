name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 5 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit, not just the tip.
          fetch-depth: 0
      # The gitleaks GitHub Action requires a paid license for org repos; the CLI
      # (MIT) does not. Run the pinned binary directly.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan git history for secrets
        run: gitleaks git . --config .gitleaks.toml --redact --verbose --no-banner

  govulncheck:
    name: Go vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        # Pure-Go default tiers; cgo backend is excluded to avoid the libyang
        # build here (its C deps are pinned and tracked in /VERSIONS).
        run: cd go && govulncheck ./cambium/... ./codegen/... ./compat/... ./datatree/...
