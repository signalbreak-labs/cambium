# Shared conformance corpus manifest.
#
# Each case loads the YANG modules in `module`, parses `input`, and asserts that
# Cambium serializes to every file listed in `expected` byte-for-byte. When
# `oracle = true` the runner also checks the output against an independent
# `yanglint` invocation.

















# Cases with tier = "schema-ir" are pure-Go schema IR fixtures: they have no
# data input and assert structural schema properties instead of serialized
# bytes. Backend runners must skip them.

[[case]]
name = "schema-cross-kind-order"
invariants = ["I2"]
tier = "schema-ir"
module = "fixtures/schema-cross-kind-order/module"
expected-ir = "fixtures/schema-cross-kind-order/expected-ir.json"

